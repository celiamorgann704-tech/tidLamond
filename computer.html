<!DOCTYPE html>
<html lang="ar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قسم الحاسب الالي</title>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Cairo';
            direction: rtl;
            text-align: center;
            margin: 0;
        }

        nav {
            background: #808680;
            padding: 12px;
        }

        nav a {
            color: #fff;
            text-decoration: none;
        }

        .section {
            padding: 50px;
        }

        img {
            width: 280px;
            height: 280px;
            object-fit: cover;
            border-radius: 12px;
            margin: 10px;
        }

        .btn {
            padding: 10px 20px;
            background: #808680;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }

        @media (max-width:600px) {
            .section {
                padding: 25px 10px;
            }

            img {
                width: 100%;
                max-width: 320px;
                height: auto;
            }

            h2 {
                font-size: 22px;
            }

            p {
                font-size: 16px;
            }
        }
    </style>
</head>

<body>
    <nav><a href="index.html">الرئيسية</a></nav>

    <div class="section">
        <h2>قسم الحاسب الالي</h2>

        <img src="computer1.jpeg">
        <img src="computer2.jpeg">

        <p>قسم الحاسب لتعلم استخدام الكمبيوتر والبرامج المختلفة.</p>

        <button class="btn" onclick="window.location='index.html#departments'">رجوع</button>
    </div>
</body>

</html>
