<!DOCTYPE html>
<html lang="ar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قسم البرمجة</title>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Cairo', sans-serif;
            direction: rtl;
            margin: 0;
            background: #fdfdfd;
        }

        nav {
            background: #808680;
            text-align: center;
            padding: 12px;
        }

        nav a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
            font-size: 14px;
        }

        .section {
            text-align: center;
            padding: 50px 20px;
        }

        .gallery {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        .gallery img {
            width: 280px;
            height: 280px;
            object-fit: cover;
            border-radius: 12px;
        }

        .btn {
            margin-top: 30px;
            padding: 10px 20px;
            background: #808680;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>

</head>

<body>

    <nav>
        <a href="index.html">الرئيسية</a>
    </nav>

    <div class="section">
        <h2>قسم البرمجة</h2>

        <div class="gallery">
            <img src="programming1.jpeg">
            <img src="programming2.jpeg">
        </div>

        <p>قسم البرمجة لتعلم تطوير المواقع والتطبيقات الحديثة.</p>

        <button class="btn" onclick="window.location='index.html#departments'">رجوع</button>

    </div>

</body>

</html>
